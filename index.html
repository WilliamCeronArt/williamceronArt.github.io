<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>William Cerón | ResumidoW</title>

<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

/* INTRO */
.intro {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 1.8em;
    text-align: center;
    opacity: 0;
    animation: fadeIn 3s forwards;
}

@keyframes fadeIn {
    to { opacity: 1; }
}

.section {
    padding: 80px 20px;
    max-width: 1100px;
    margin: auto;
}

/* 1. ESTILO RESUMIDOW (Galería Minimalista) */
.resumido {
    text-align: center;
}

.resumido h2 {
    font-weight: normal;
    letter-spacing: 4px;
    margin-bottom: 10px;
}

.resumido p {
    opacity: 0.5;
    font-style: italic;
    margin-bottom: 50px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
}

.gallery img {
    width: 100%;
    height: auto;
    cursor: pointer;
    transition: 0.6s ease;
    opacity: 0;
    transform: translateY(30px);
    border: 1px solid rgba(255,255,255,0.1);
}

.gallery img.visible {
    opacity: 1;
    transform: translateY(0);
}

/* 2. ESTILO MIS OBRAS (Muestra Detallada) */
.mis-obras-section {
    padding: 100px 20px;
    text-align: center;
    background: #050505; /* Fondo sutilmente distinto */
}

.mis-obras-section h2 {
    letter-spacing: 6px;
    margin-bottom: 70px;
    font-size: 1.5em;
}

.obra-contenedor {
    margin-bottom: 120px;
}

.obra-contenedor img {
    width: 95%;
    max-width: 800px;
    border: 1px solid rgba(255,255,255,0.4);
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.obra-contenedor p {
    margin-top: 25px;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-size: 0.85em;
    color: #aaa;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    background: rgba(0,0,0,0.98);
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal img {
    max-width: 95%;
    max-height: 95%;
}

.frase-final {
    text-align: center;
    font-size: 1.4em;
    opacity: 0.5;
    margin: 150px 0;
    font-style: italic;
}

footer {
    text-align: center;
    padding: 80px;
    opacity: 0.3;
    font-size: 0.75em;
    letter-spacing: 1px;
}
</style>
</head>

<body>

<section class="intro">
    <div>No necesito mucho para decir más</div>
</section>

<section class="section resumido">
    <h2>RESUMIDOW</h2>
    <p>Lo esencial no se pinta… se revela</p>

    <div class="gallery">
        <img src="La%20chica%20de%20la%20flor.jpeg" onclick="openModal(this)" alt="La chica de la flor">
        <img src="Estampida.jpeg" onclick="openModal(this)" alt="Estampida">
        <img src="Giro%20vital.jpeg" onclick="openModal(this)" alt="Giro Vital">
    </div>
</section>

<div class="frase-final">Antes de reducir… tuve que aprender a ver</div>

<section class="mis-obras-section">
    <h2>MIS OBRAS</h2>
    
    <div class="obra-contenedor">
        <img src="Estampida.jpeg" alt="Estampida">
        <p>Estampida</p>
    </div>

    <div class="obra-contenedor">
        <img src="La%20chica%20de%20la%20flor.jpeg" alt="La chica de la flor">
        <p>La chica de la flor</p>
    </div>

    <div class="obra-contenedor">
        <img src="Giro%20vital.jpeg" alt="Giro vital">
        <p>Giro Vital</p>
    </div>
</section>

<div class="modal" id="modal" onclick="closeModal()">
    <img id="modalImg">
</div>

<footer>
    WILLIAM CERÓN — EL ARTE VIVE DONDE NO SE EXPLICA
</footer>

<script>
function openModal(img){
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalImg").src = img.src;
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

// Efecto de aparición suave de imágenes
const images = document.querySelectorAll('.gallery img');
function checkScroll() {
    const trigger = window.innerHeight * 0.85;
    images.forEach(img => {
        const top = img.getBoundingClientRect().top;
        if(top < trigger){
            img.classList.add('visible');
        }
    });
}
window.addEventListener('scroll', checkScroll);
window.addEventListener('load', checkScroll);
</script>

</body>
</html>

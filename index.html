<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>William Cerón | ResumidoW</title>

<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

/* INTRO */
.intro {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 1.8em;
    text-align: center;
    opacity: 0;
    animation: fadeIn 3s forwards;
}

@keyframes fadeIn {
    to { opacity: 1; }
}

/* SECCIONES */
.section {
    padding: 100px 20px;
    max-width: 1100px;
    margin: auto;
}

/* RESUMIDOW */
.resumido {
    text-align: center;
}

.resumido h2 {
    font-weight: normal;
    letter-spacing: 3px;
    margin-bottom: 10px;
}

.resumido p {
    opacity: 0.5;
    font-style: italic;
}

/* GALERÍA */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
    margin-top: 40px;
}

.gallery img {
    width: 100%;
    height: auto;
    cursor: pointer;
    transition: 0.6s ease;
    opacity: 0;
    transform: translateY(40px);
}

.gallery img.visible {
    opacity: 1;
    transform: translateY(0);
}

.gallery img:hover {
    transform: scale(1.05);
}

/* OBRA REAL */
.real {
    background: #050505;
}

/* DESTACADA */
.destacada {
    grid-column: span 2;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    background: rgba(0,0,0,0.95);
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal img {
    max-width: 90%;
    max-height: 90%;
}

/* FRASE TRANSICIÓN */
.frase {
    text-align: center;
    font-size: 1.5em;
    opacity: 0.6;
    margin: 100px 0;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 40px;
    opacity: 0.3;
}
</style>
</head>

<body>
<section style="padding: 20px; text-align: center;">
    <h2 style="letter-spacing: 3px; color: white;">MIS OBRAS</h2>
    
    <div style="margin-bottom: 40px;">
        <img src="Estampida.jpeg" alt="Estampida" style="width: 90%; max-width: 600px; border: 2px solid #fff; border-radius: 8px;">
        <p style="color: white; margin-top: 10px;">Estampida</p>
    </div>

    <div style="margin-bottom: 40px;">
        <img src="La%20chica%20de%20la%20flor.jpeg" alt="La chica de la flor" style="width: 90%; max-width: 600px; border: 2px solid #fff; border-radius: 8px;">
        <p style="color: white; margin-top: 10px;">La chica de la flor</p>
    </div>

    <div style="margin-bottom: 40px;">
        <img src="Giro%20vital.jpeg" alt="Giro vital" style="width: 90%; max-width: 600px; border: 2px solid #fff; border-radius: 8px;">
        <p style="color: white; margin-top: 10px;">Giro Vital</p>
    </div>
</section>
<section class="intro">
    <div>
        No necesito mucho para decir más
    </div>
</section>

<section class="section resumido">
    <h2>RESUMIDOW</h2>
    <p>Lo esencial no se pinta… se revela</p>

    <div class="gallery">
        <img src="resumido/resumido1.jpg" onclick="openModal(this)" alt="La chica de la flor">
        <img src="resumido/resumido2.jpg" onclick="openModal(this)" alt="Estampida">
        <img src="resumido/resumido3.jpg" onclick="openModal(this)" alt="Giro Vital">
    </div>
</section>

<div class="frase">
    Antes de reducir… tuve que aprender a ver
</div>

<section class="section real">
    <h2>OBRA</h2>
    <div class="gallery">
        <img src="obra/obra_principal.jpg" class="destacada" onclick="openModal(this)">
    </div>
</section>

<div class="modal" id="modal" onclick="closeModal()">
    <img id="modalImg">
</div>

<footer>
    William Cerón — El arte vive donde no se explica
</footer>

<script>
function openModal(img){
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalImg").src = img.src;
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

const images = document.querySelectorAll('.gallery img');

function checkScroll() {
    const trigger = window.innerHeight * 0.85;
    images.forEach(img => {
        const top = img.getBoundingClientRect().top;
        if(top < trigger){
            img.classList.add('visible');
        }
    });
}

window.addEventListener('scroll', checkScroll);
window.addEventListener('load', checkScroll);
</script>

</body>
</html>

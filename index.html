<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>William Cerón | ResumidoW</title>

<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

/* INTRO */
.intro {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 1.8em;
    text-align: center;
    opacity: 0;
    animation: fadeIn 3s forwards;
}

@keyframes fadeIn {
    to { opacity: 1; }
}

/* SECCIONES GENERALES */
.section {
    padding: 100px 20px;
    max-width: 1100px;
    margin: auto;
}

/* RESUMIDOW GALERÍA */
.resumido {
    text-align: center;
}

.resumido h2 {
    font-weight: normal;
    letter-spacing: 3px;
    margin-bottom: 10px;
}

.resumido p {
    opacity: 0.5;
    font-style: italic;
    margin-bottom: 40px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
    margin-top: 40px;
}

.gallery-item img {
    width: 100%;
    height: auto;
    cursor: pointer;
    transition: 0.6s ease;
    opacity: 0;
    transform: translateY(40px);
    border: 1px solid rgba(255,255,255,0.1);
}

.gallery img.visible {
    opacity: 1;
    transform: translateY(0);
}

/* SECCIÓN MIS OBRAS (DETALLADA) */
.mis-obras-section {
    padding: 60px 20px;
    text-align: center;
    background: #050505; /* Un tono ligeramente diferente para separar */
}

.mis-obras-section h2 {
    letter-spacing: 5px;
    margin-bottom: 50px;
    font-weight: bold;
}

.obra-contenedor {
    margin-bottom: 80px;
}

.obra-contenedor img {
    width: 95%;
    max-width: 700px;
    border: 2px solid #fff;
    border-radius: 4px;
    transition: 0.4s;
}

.obra-contenedor p {
    margin-top: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-size: 0.9em;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    background: rgba(0,0,0,0.95);
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal img {
    max-width: 90%;
    max-height: 90%;
}

/* FRASE TRANSICIÓN */
.frase {
    text-align: center;
    font-size: 1.5em;
    opacity: 0.6;
    margin: 100px 0;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 60px;
    opacity: 0.3;
    font-size: 0.8em;
}
</style>
</head>

<body>

<section class="intro">
    <div>No necesito mucho para decir más</div>
</section>

<section class="section resumido">
    <h2>RESUMIDOW</h2>
    <p>Lo esencial no se pinta… se revela</p>

    <div class="gallery">
        <div class="gallery-item">
            <img src="La%20chica%20de%20la%20flor.jpeg" onclick="openModal(this)" alt="La chica de la flor">
        </div>
        <div class="gallery-item">
            <img src="Estampida.jpeg" onclick="openModal(this)" alt="Estampida">
        </div>
        <div class="gallery-item">
            <img src="Giro%20vital.jpeg" onclick="openModal(this)" alt="Giro Vital">
        </div>
    </div>
</section>

<div class="frase">Antes de reducir… tuve que aprender a ver</div>

<section class="mis-obras-section">
    <h2>MIS OBRAS</h2>
    
    <div class="obra-contenedor">
        <img src="Estampida.jpeg" alt="Estampida">
        <p>Estampida</p>
    </div>

    <div class="obra-contenedor">
        <img src="La%20chica%20de%20la%20flor.jpeg" alt="La chica de la flor">
        <p>La chica de la flor</p>
    </div>

    <div class="obra-contenedor">
        <img src="Giro%20vital.jpeg" alt="Giro vital">
        <p>Giro Vital</p>
    </div>
</section>

<div class="modal" id="modal" onclick="closeModal()">
    <img id="modalImg">
</div>

<footer>
    William Cerón — El arte vive donde no se explica
</footer>

<script>
function openModal(img){
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalImg").src = img.src;
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

// Efecto de aparición al hacer scroll
const images = document.querySelectorAll('.gallery img');
function checkScroll() {
    const trigger = window.innerHeight * 0.85;
    images.forEach(img => {
        const top = img.getBoundingClientRect().top;
        if(top < trigger){
            img.classList.add('visible');
        }
    });
}

window.addEventListener('scroll', checkScroll);
window.addEventListener('load', checkScroll);
</script>

</body>
</html>
